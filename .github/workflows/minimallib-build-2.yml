name: Build MinimalLib, local-boost single-docker

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract RDKit version
        id: version
        run: |
          YEAR=$(grep -F 'set(RDKit_Year' CMakeLists.txt | cut -d'"' -f2)
          MONTH=$(grep -F 'set(RDKit_Month' CMakeLists.txt | cut -d'"' -f2)
          MONTH=$((10#${MONTH}))
          REV=$(grep -F 'set(RDKit_Revision ' CMakeLists.txt | cut -d'"' -f2)
          REV=$((10#${REV}))
          MOD=$(grep -F 'set(RDKit_RevisionModifier' CMakeLists.txt | cut -d'"' -f2)
          VERSION="${YEAR}.${MONTH}.${REV}"
          [ -n "$MOD" ] && VERSION="${VERSION}-${MOD}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build WASM
        run: |
          docker buildx build \
            --build-arg VERSION=${{ steps.version.outputs.version }} \
            --file Code/MinimalLib/docker/build-wasm.Dockerfile \
            --target export-stage \
            --output type=local,dest=Code/MinimalLib/build \
            .

      - name: Test WASM artifacts
        run: node Code/MinimalLib/tests/tests.js

      - name: Make package
        working-directory: Code/MinimalLib/build
        run: npm pack

      - name: Dry Publish
        working-directory: Code/MinimalLib/build
        run: npm publish --dry-run
