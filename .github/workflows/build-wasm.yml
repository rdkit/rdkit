name: Build MinimalLib WASM

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build WASM
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Code/MinimalLib/docker/build-wasm.Dockerfile
          target: export-stage
          outputs: type=local,dest=dist
          push: false

      - name: Test WASM artifacts
        run: RDKIT_MINIMAL_JS=$PWD/dist/RDKit_minimal.js node Code/MinimalLib/tests/tests.js

