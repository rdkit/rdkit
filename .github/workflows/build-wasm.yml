name: Build MinimalLib WASM

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build WASM
        run: |
          docker buildx build \
            --file Code/MinimalLib/docker/build-wasm.Dockerfile \
            --target export-stage \
            --output type=local,dest=dist \
            .

      - name: Test WASM artifacts
        run: RDKIT_MINIMAL_JS=$PWD/dist/RDKit_minimal.js node Code/MinimalLib/tests/tests.js

